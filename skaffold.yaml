apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: querymesh
build:
  artifacts:
    - image: querymesh/crawler
      context: crawler
      docker:
        dockerfile: Dockerfile
  local:
    concurrency: 1
    push: false
manifests:
  rawYaml:
    - k8s/namespace.yaml
    - k8s/zookeeper.yaml
    - k8s/kafka.yaml
    - k8s/kafka-topics-job.yaml
    - k8s/valkey.yaml
    - k8s/minio.yaml
    - k8s/minio-bucket-job.yaml
    - k8s/fetcher-config.yaml
    - k8s/fetcher.yaml
deploy:
  kubectl: {}
portForward:
  - resourceType: service
    resourceName: kafka
    port: 9093
    localPort: 9093
  - resourceType: service
    resourceName: fetcher
    port: 8080
    localPort: 8080
profiles:
  - name: dev
    activation:
      - command: dev
    build:
      local:
        push: false
