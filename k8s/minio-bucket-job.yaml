# Job to create the MinIO buckets if they don't exist. 
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-buckets
  namespace: querymesh
spec:
  template:
    metadata:
      labels:
        app: minio-create-buckets
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          env:
            - name: MINIO_ENDPOINT
              value: http://s3:9000
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: accesskey
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: secretkey
          command:
            - sh
            - -c
            - |
              set -e
              mc alias set local "${MINIO_ENDPOINT}" "${MINIO_ACCESS_KEY}" "${MINIO_SECRET_KEY}"
              # Create raw content bucket
              mc mb --ignore-existing local/crawler-raw
              mc anonymous set download local/crawler-raw
              # Create parsed content bucket
              mc mb --ignore-existing local/crawler-parsed
              mc anonymous set download local/crawler-parsed
              echo "all buckets ensured"
