apiVersion: v1
kind: ConfigMap
metadata:
  name: parser-config
  namespace: querymesh
data:
  # Kafka settings
  KAFKA_BROKER: kafka:9092
  PARSER_GROUP_ID: parser-group
  FETCH_SUCCESS_TOPIC: crawl.fetch.success
  PARSE_SUCCESS_TOPIC: crawl.parse.success
  PARSE_DLQ_TOPIC: crawl.parse.dlq
  FRONTIER_READY_TOPIC: frontier.ready
  
  # Worker settings
  WORKER_COUNT: "4"
  
  # Execution mode
  EXECUTION_MODE: "parser"
  
  # Valkey settings
  VALKEY_ADDR: valkey:6379
  VALKEY_PASSWORD: ""
  
  # S3/MinIO settings (credentials from secret)
  S3_ENDPOINT: s3:9000
  S3_BUCKET: crawler-raw
  S3_PARSED_BUCKET: crawler-parsed
  S3_USE_SSL: "false"
  S3_REGION: us-east-1
  
  # Bloom filter settings
  BLOOM_FILTER_KEY: bloom:urls
  BLOOM_EXPECTED_ITEMS: "10000000"
  BLOOM_FALSE_POSITIVE_RATE: "0.01"
  BLOOM_TTL: "0"
  
  # Health server
  HEALTH_PORT: "8080"
