apiVersion: apps/v1
kind: Deployment
metadata:
  name: fetcher
  namespace: querymesh
  labels:
    app: fetcher
    component: crawler
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fetcher
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: fetcher
        component: crawler
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Kafka..."
              until nc -z kafka 9092; do
                echo "  kafka:9092 not reachable, retrying in 2s..."
                sleep 2
              done
              echo "Kafka ready. Waiting for Valkey..."
              until nc -z valkey 6379; do
                echo "  valkey:6379 not reachable, retrying in 2s..."
                sleep 2
              done
              echo "Valkey ready. Waiting for S3..."
              until nc -z s3 9000; do
                echo "  s3:9000 not reachable, retrying in 2s..."
                sleep 2
              done
              echo "All dependencies ready. Sleeping 10s for full initialization..."
              sleep 10
              echo "Starting fetcher."
      containers:
        - name: fetcher
          image: querymesh/crawler:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: health
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: fetcher-config
          env:
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: accesskey
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: secretkey
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: health
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: fetcher
  namespace: querymesh
  labels:
    app: fetcher
spec:
  selector:
    app: fetcher
  ports:
    - name: health
      port: 8080
      targetPort: 8080
  type: ClusterIP
