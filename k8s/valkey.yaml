apiVersion: v1
kind: Service
metadata:
  name: valkey
  namespace: querymesh
  labels:
    app: valkey
spec:
  ports:
    - name: client
      port: 6379
      targetPort: 6379
  selector:
    app: valkey
  type: ClusterIP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: valkey
  namespace: querymesh
  labels:
    app: valkey
spec:
  serviceName: valkey
  replicas: 1
  selector:
    matchLabels:
      app: valkey
  template:
    metadata:
      labels:
        app: valkey
    spec:
      containers:
        - name: valkey
          image: docker.io/valkey/valkey:7.2
          ports:
            - containerPort: 6379
              name: client
          args:
            - "--save"
            - "60"
            - "1"
            - "--appendonly"
            - "yes"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
