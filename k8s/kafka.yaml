apiVersions: v1
kind: Deployment
metadata:
  name: kafka
  lables:
    app: kafka
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: kafka
    template:
      metadata:
        labels:
          app: kafka
      spec:
        containers:
          - name: kafka
            image: confluentinc/cp-kafka:latest
            ports:
              - containerPort: 9092
            env:
              - name: KAFKA_BROKER_ID
                value: "1"
              - name: KAFKA_ZOOKEEPER_CONNECT
                value: "zookeeper-service:2181"
              # Advertise the K8s service DNS name so consumers inside the cluster
              # can connect to Kafka using the service name.
              - name: KAFKA_ADVERTISED_LISTENERS
                value: "PLAINTEXT://kafka-service:9092"
              - name: KAFKA_LISTENERS
                value: "PLAINTEXT://0.0.0.0:9092"
              - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
                value: "PLAINTEXT:PLAINTEXT"
              - name: KAFKA_INTER_BROKER_LISTENER_NAME
                value: "PLAINTEXT"
              - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
                value: "1"
              - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
                value: "true"
            resources:
              requests:
                memory: "512Mi"
                cpu: "200m"
              limits:
                memory: "1Gi"
                cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
spec:
  selector:
    app: kafka
  ports:
    - name: plaintext
      port: 9092
      targetPort: 9092
  type: ClusterIP
