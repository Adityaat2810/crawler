apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: s3-data
  namespace: querymesh

spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: s3
  namespace: querymesh
  labels:
    app: s3
spec:
  replicas: 1
  selector:
    matchLabels:
      app: s3
  template:
    metadata:
      labels:
        app: s3
    spec:
      containers:
        - name: s3
          image: quay.io/minio/minio:RELEASE.2024-03-21T23-13-43Z
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: accesskey
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: secretkey
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: s3-data

---
apiVersion: v1
kind: Secret
metadata:
  name: s3-credentials
  namespace: querymesh
type: Opaque
stringData:
  accesskey: minioadmin
  secretkey: minioadmin

---
apiVersion: v1
kind: Service
metadata:
  name: s3
  namespace: querymesh
  labels:
    app: s3
spec:
  selector:
    app: s3
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
