# 1. Consumer
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crawler-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crawler-manager
  template:
    metadata:
      labels:
        app: crawler-manager
    spec:
      containers:
        - name: crawler
          image: your-repo/search-engine:latest
          args: ["--mode=manager"]
          env:
            - name: KAFKA_BROKERS
              value: "kafka-service:9092"
            - name: REDIS_ADDR
              value: "redis-service:6379"

---
# 2. The Fetchers
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crawler-fetcher
spec:
  replicas: 5
  selector:
    matchLabels:
      app: crawler-fetcher
  template:
    metadata:
      labels:
        app: crawler-fetcher
    spec:
      containers:
      - name: crawler
        image: your-repo/search-engine:latest
        args: ["--mode=fetcher"]
        env:
          - name: KAFKA_BROKERS
            value: "kafka-service:9092"
          - name: S3_BUCKET
            value: "raw-html-storage"

---

# 3. The Parsers (CPU Intensive)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crawler-parser
spec:
  replicas: 2 # Scale based on CPU usage
  selector:
    matchLabels:
      app: crawler-parser
  template:
    metadata:
      labels:
        app: crawler-parser
    spec:
      containers:
      - name: crawler
        image: your-repo/search-engine:latest
        args: ["--mode=parser"]
        env:
          - name: KAFKA_BROKERS
            value: "kafka-service:9092"
          - name: DYNAMODB_TABLE
            value: "url-metadata"