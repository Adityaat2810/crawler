apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-consumer
  namespace: querymesh
  labels:
    app: kafka-consumer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kafka-consumer
  template:
    metadata:
      labels:
        app: kafka-consumer
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Kafka port to open..."
              until nc -z kafka 9092; do
                echo "  kafka:9092 not reachable, retrying in 2s..."
                sleep 2
              done
              echo "Kafka port is open. Sleeping 15s for broker to fully initialize..."
              sleep 15
              echo "Done. Starting consumer."
      containers:
        - name: kafka-consumer
          image: querymesh/consumer:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: consumer-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - kill -0 1
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - kill -0 1
            initialDelaySeconds: 5
            periodSeconds: 10
